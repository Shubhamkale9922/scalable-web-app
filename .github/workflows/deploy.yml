name: Deploy Docker App to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Download repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t scalable-web-app .

      # 5. Tag Docker image for ECR
      - name: Tag Docker Image
        run: |
          docker tag scalable-web-app:latest 138185517964.dkr.ecr.ap-south-1.amazonaws.com/scalable-web-app:latest

      # 6. Push Docker image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push 138185517964.dkr.ecr.ap-south-1.amazonaws.com/scalable-web-app:latest

      # 7. Force ECS deployment
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster scalable-web-app-cluster \
            --service scalable-web-app-service \
            --force-new-deployment